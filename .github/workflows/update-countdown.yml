name: Update exam countdown

on:
  schedule:
    - cron: "0 0 * * *"
      timezone: "Asia/Tokyo"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-countdown:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README countdown
        run: python scripts/update_countdown.py

      - name: Commit and push when changed
        run: |
          if git diff --quiet -- README.md; then
            echo "README is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "Update exam countdown"
          git pull --rebase origin main
          git push origin HEAD:main
